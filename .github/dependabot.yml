version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      frontend-major:
        patterns:
          - "*"
        update-types:
          - "major"
      frontend-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "gradle"
    directory: "/backend"
    schedule:
      interval: "weekly"
    groups:
      backend-major:
        patterns:
          - "*"
        update-types:
          - "major"
      backend-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
