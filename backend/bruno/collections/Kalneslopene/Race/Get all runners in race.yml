info:
  name: Get all runners in race
  type: http
  seq: 2

http:
  method: GET
  url: "{{url}}/api/races/:uuid/runners"
  params:
    - name: uuid
      value: b1000000-0000-0000-0000-000000000008
      type: path
  body:
    type: text
    data: |-
      {
          "uuid": "a1000000-0000-0000-0000-000000000001",
          "name": "Eirik Solberg",
          "gender": "Mann"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

