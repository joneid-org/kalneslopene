info:
  name: Get all races by runner
  type: http
  seq: 3

http:
  method: GET
  url: "{{url}}/api/runners/:uuid/races"
  params:
    - name: uuid
      value: a1000000-0000-0000-0000-000000000001
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

