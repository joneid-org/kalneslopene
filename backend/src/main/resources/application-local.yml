spring:
  application:
    name: kalneslopene
  datasource:
    url: jdbc:postgresql://localhost:5432/torsdagslopet
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  liquibase:
    drop-first: true
    enabled: true
    change-log: classpath:db/changelog/changelog-master.yaml
  jpa:
    hibernate:
      ddl-auto: none

baseline-data:
  enabled: false # True to test with baselinedata
mockdata:
  enabled: true # True to test with mockdata

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: torsdagslopet