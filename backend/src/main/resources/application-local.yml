spring:
  application:
    name: kalneslopene
  datasource:
    url: jdbc:postgresql://localhost:5432/torsdagslopet
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  liquibase:
    drop-first: true
    enabled: true
    change-log: classpath:db/changelog/changelog-master.yaml
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: Europe/Oslo
